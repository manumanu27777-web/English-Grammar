<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Prepositions of Place, Direction & Time</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom animations for hover effects */
        .group:hover .anim-bounce-up { transform: translateY(-4px); transition: transform 0.3s ease; }
        .group:hover .anim-slide-right { transform: translateX(4px); transition: transform 0.3s ease; }
        .group:hover .anim-slide-down { transform: translateY(4px); transition: transform 0.3s ease; }
        .group:hover .anim-scale { transform: scale(1.1); transition: transform 0.3s ease; }
        .group:hover .anim-pulse { opacity: 0.7; transition: opacity 0.3s ease; }
        
        .svg-container svg {
            transition: all 0.3s ease;
        }
        
        /* Highlight styling for the preposition in the sentence */
        b.highlight {
            color: #2563eb; /* blue-600 */
            font-weight: 700;
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-10">
            <h1 class="text-3xl md:text-5xl font-black tracking-tight text-slate-900 mb-3 uppercase">
                Prepositions of Place, Direction & Time
            </h1>
            <p class="text-lg text-slate-600 flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-500"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
                Click any card to hear it read aloud
            </p>
        </header>

        <!-- Grid Container -->
        <main id="preposition-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 gap-4 md:gap-6">
            <!-- Cards will be injected here by JavaScript -->
        </main>

        <!-- Footer -->
        <footer class="mt-12 text-center text-sm text-slate-500 border-t border-slate-200 pt-6">
            Based on the concepts shown in "Learn English With Rajesh"
        </footer>
    </div>

    <script>
        // --- SVG Drawing Helpers ---
        // These reusable strings create the 3D shapes and markers
        const defs = `
            <defs>
                <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                    <path d="M 0 1 L 8 5 L 0 9 z" fill="#0f172a" />
                </marker>
                <marker id="arrow-start" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                    <path d="M 10 1 L 2 5 L 10 9 z" fill="#0f172a" />
                </marker>
            </defs>
        `;

        const CUBE = `
            <g stroke="#0f172a" stroke-width="2.5" stroke-linejoin="round" class="transition-transform duration-300">
                <polygon points="30,45 45,30 75,30 60,45" fill="#f8fafc" />
                <polygon points="60,45 75,30 75,60 60,75" fill="#e2e8f0" />
                <rect x="30" y="45" width="30" height="30" fill="#ffffff" />
            </g>
        `;

        const CUBE_OPEN = `
            <g stroke="#0f172a" stroke-width="2.5" stroke-linejoin="round">
                <polygon points="30,45 45,30 75,30 60,45" fill="#cbd5e1" />
                <polygon points="60,45 75,30 75,60 60,75" fill="#e2e8f0" />
                <rect x="30" y="45" width="30" height="30" fill="#ffffff" />
            </g>
        `;

        const DOT = (cx, cy, extraClass="") => `<circle cx="${cx}" cy="${cy}" r="7" fill="#3b82f6" stroke="#0f172a" stroke-width="2" class="anim-bounce-up ${extraClass}" />`;
        
        const ARROW = (d, extraClass="") => `<path d="${d}" fill="none" stroke="#0f172a" stroke-width="2.5" marker-end="url(#arrow)" class="${extraClass}" />`;

        const STICKMAN = (dx, dy) => `
            <g transform="translate(${dx}, ${dy})" stroke="#0f172a" stroke-width="2.5" fill="none" class="anim-bounce-up">
                <circle cx="20" cy="10" r="5" fill="#fff" />
                <line x1="20" y1="15" x2="20" y2="35" />
                <line x1="20" y1="20" x2="10" y2="30" />
                <line x1="20" y1="20" x2="30" y2="30" />
                <line x1="20" y1="35" x2="10" y2="50" />
                <line x1="20" y1="35" x2="30" y2="50" />
            </g>
        `;

        const svgWrap = (content) => `<svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-sm overflow-visible">${defs}${content}</svg>`;

        // --- Data Array containing all 28 Prepositions ---
        const prepositions = [
            {
                word: "In/Inside",
                sentence: "The cat is <b class='highlight'>in</b> the box.",
                svg: svgWrap(`${CUBE_OPEN} ${DOT(45, 60)}`)
            },
            {
                word: "At",
                sentence: "We met <b class='highlight'>at</b> the bus stop.",
                svg: svgWrap(`${CUBE} ${DOT(15, 68)}`)
            },
            {
                word: "On",
                sentence: "The book is <b class='highlight'>on</b> the table.",
                svg: svgWrap(`${CUBE} ${DOT(52, 33)}`)
            },
            {
                word: "Above",
                sentence: "The light is <b class='highlight'>above</b> the desk.",
                svg: svgWrap(`${CUBE} ${DOT(52, 12)}`)
            },
            {
                word: "Over",
                sentence: "The bird flew <b class='highlight'>over</b> the house.",
                svg: svgWrap(`${CUBE} ${ARROW("M 15 45 Q 52 5 85 45", "anim-slide-right")}`)
            },
            {
                word: "Around",
                sentence: "We walked <b class='highlight'>around</b> the park.",
                svg: svgWrap(`${CUBE} <path d="M 15 55 C 15 15, 85 15, 85 55 C 85 80, 15 80, 15 55" fill="none" stroke="#0f172a" stroke-width="2.5" marker-end="url(#arrow)" stroke-dasharray="6,4" class="anim-pulse"/>`)
            },
            {
                word: "Into",
                sentence: "She walked <b class='highlight'>into</b> the room.",
                svg: svgWrap(`${CUBE_OPEN} ${ARROW("M 10 25 L 40 55", "anim-slide-down")}`)
            },
            {
                word: "Upon",
                sentence: "The frog jumped <b class='highlight'>upon</b> the lily pad.",
                svg: svgWrap(`${CUBE} ${ARROW("M 20 15 Q 40 15 50 28", "anim-slide-down")}`)
            },
            {
                word: "Between",
                sentence: "He sat <b class='highlight'>between</b> his friends.",
                svg: svgWrap(`
                    <rect x="10" y="45" width="20" height="20" fill="#fff" stroke="#0f172a" stroke-width="2.5" />
                    <rect x="70" y="45" width="20" height="20" fill="#fff" stroke="#0f172a" stroke-width="2.5" />
                    ${DOT(50, 55, "anim-scale")}
                `)
            },
            {
                word: "Among",
                sentence: "She stood <b class='highlight'>among</b> the flowers.",
                svg: svgWrap(`
                    <rect x="20" y="20" width="10" height="10" fill="#fff" stroke="#0f172a" stroke-width="2" />
                    <rect x="70" y="25" width="10" height="10" fill="#fff" stroke="#0f172a" stroke-width="2" />
                    <rect x="15" y="65" width="10" height="10" fill="#fff" stroke="#0f172a" stroke-width="2" />
                    <rect x="75" y="60" width="10" height="10" fill="#fff" stroke="#0f172a" stroke-width="2" />
                    <rect x="45" y="15" width="10" height="10" fill="#fff" stroke="#0f172a" stroke-width="2" />
                    ${DOT(50, 50, "anim-scale")}
                `)
            },
            {
                word: "Towards",
                sentence: "He walked <b class='highlight'>towards</b> the door.",
                svg: svgWrap(`
                    <rect x="65" y="35" width="25" height="30" fill="#fff" stroke="#0f172a" stroke-width="2.5" />
                    ${ARROW("M 10 50 L 55 50", "anim-slide-right")}
                `)
            },
            {
                word: "Through",
                sentence: "The train went <b class='highlight'>through</b> the tunnel.",
                svg: svgWrap(`
                    <path d="M 30 35 L 70 35 A 10 15 0 0 1 70 65 L 30 65 A 10 15 0 0 1 30 35" fill="#f8fafc" stroke="#0f172a" stroke-width="2.5"/>
                    <ellipse cx="30" cy="50" rx="10" ry="15" fill="#fff" stroke="#0f172a" stroke-width="2.5"/>
                    ${ARROW("M 5 50 L 95 50", "anim-slide-right")}
                `)
            },
            {
                word: "Under",
                sentence: "The dog is <b class='highlight'>under</b> the table.",
                svg: svgWrap(`
                    <polygon points="20,40 30,25 80,25 70,40" fill="#fff" stroke="#0f172a" stroke-width="2.5" stroke-linejoin="round"/>
                    <line x1="25" y1="40" x2="25" y2="70" stroke="#0f172a" stroke-width="2.5" />
                    <line x1="65" y1="40" x2="65" y2="70" stroke="#0f172a" stroke-width="2.5" />
                    <line x1="75" y1="25" x2="75" y2="55" stroke="#0f172a" stroke-width="2.5" />
                    ${DOT(45, 60)}
                `)
            },
            {
                word: "Before",
                sentence: "Please arrive <b class='highlight'>before</b> the meeting.",
                svg: svgWrap(`${CUBE} ${DOT(30, 60, "anim-scale")}`)
            },
            {
                word: "Behind",
                sentence: "The car is parked <b class='highlight'>behind</b> the garage.",
                svg: svgWrap(`${DOT(68, 38)} ${CUBE}`)
            },
            {
                word: "In front of",
                sentence: "The teacher stood <b class='highlight'>in front of</b> the class.",
                svg: svgWrap(`${CUBE} ${DOT(45, 65, "anim-scale")}`)
            },
            {
                word: "Next to",
                sentence: "I sat <b class='highlight'>next to</b> my sister.",
                svg: svgWrap(`${CUBE} ${DOT(85, 60)}`)
            },
            {
                word: "Near",
                sentence: "The park is <b class='highlight'>near</b> the school.",
                svg: svgWrap(`${CUBE} ${DOT(92, 60)}`)
            },
            {
                word: "Along",
                sentence: "We walked <b class='highlight'>along</b> the river.",
                svg: svgWrap(`
                    <circle cx="20" cy="30" r="4" fill="#64748b" /><circle cx="50" cy="30" r="4" fill="#64748b" /><circle cx="80" cy="30" r="4" fill="#64748b" />
                    <circle cx="20" cy="70" r="4" fill="#64748b" /><circle cx="50" cy="70" r="4" fill="#64748b" /><circle cx="80" cy="70" r="4" fill="#64748b" />
                    ${ARROW("M 10 50 L 90 50", "anim-slide-right")}
                `)
            },
            {
                word: "Across",
                sentence: "He swam <b class='highlight'>across</b> the lake.",
                svg: svgWrap(`
                    <line x1="10" y1="35" x2="90" y2="35" stroke="#64748b" stroke-width="2.5" stroke-dasharray="8" />
                    <line x1="10" y1="65" x2="90" y2="65" stroke="#64748b" stroke-width="2.5" stroke-dasharray="8" />
                    ${ARROW("M 40 85 L 60 15", "anim-slide-up")}
                `)
            },
            {
                word: "Opposite",
                sentence: "The bank is <b class='highlight'>opposite</b> the bakery.",
                svg: svgWrap(`
                    ${STICKMAN(0, 20)}
                    ${STICKMAN(60, 20)}
                    <path d="M 35 45 L 65 45" fill="none" stroke="#0f172a" stroke-width="2.5" marker-start="url(#arrow-start)" marker-end="url(#arrow)" class="anim-pulse" />
                `)
            },
            {
                word: "Out of",
                sentence: "The cat jumped <b class='highlight'>out of</b> the window.",
                svg: svgWrap(`${CUBE_OPEN} ${ARROW("M 45 55 Q 70 30 90 50", "anim-slide-right")}`)
            },
            {
                word: "Up",
                sentence: "She went <b class='highlight'>up</b> the stairs.",
                svg: svgWrap(`
                    <polyline points="10,80 30,80 30,60 50,60 50,40 70,40 70,20 90,20" fill="none" stroke="#0f172a" stroke-width="2.5" stroke-linejoin="round"/>
                    ${ARROW("M 20 65 L 60 25", "anim-bounce-up")}
                `)
            },
            {
                word: "Down",
                sentence: "He ran <b class='highlight'>down</b> the hill.",
                svg: svgWrap(`
                    <polyline points="10,20 30,20 30,40 50,40 50,60 70,60 70,80 90,80" fill="none" stroke="#0f172a" stroke-width="2.5" stroke-linejoin="round"/>
                    ${ARROW("M 30 25 L 70 65", "anim-slide-down")}
                `)
            },
            {
                word: "Away",
                sentence: "He walked <b class='highlight'>away</b> from the house.",
                svg: svgWrap(`${CUBE} ${ARROW("M 65 60 L 95 60", "anim-slide-right")}`)
            },
            {
                word: "By",
                sentence: "She lives <b class='highlight'>by</b> the lake.",
                svg: svgWrap(`
                    ${STICKMAN(0, 30)}
                    <g transform="translate(45, 30)" stroke="#0f172a" stroke-width="2.5" fill="#fff" stroke-linejoin="round">
                        <polygon points="25,5 5,25 45,25" />
                        <rect x="10" y="25" width="30" height="25" />
                        <rect x="20" y="35" width="10" height="15" />
                    </g>
                `)
            },
            {
                word: "From",
                sentence: "The letter is <b class='highlight'>from</b> my friend.",
                svg: svgWrap(`
                    <rect x="15" y="40" width="20" height="20" fill="#fff" stroke="#0f172a" stroke-width="2.5" />
                    ${ARROW("M 40 50 L 85 50", "anim-slide-right")}
                `)
            },
            {
                word: "To",
                sentence: "We are going <b class='highlight'>to</b> the cinema.",
                svg: svgWrap(`
                    <rect x="65" y="40" width="20" height="20" fill="#fff" stroke="#0f172a" stroke-width="2.5" />
                    ${ARROW("M 15 50 L 60 50", "anim-slide-right")}
                `)
            },
            {
                word: "Off",
                sentence: "The hat fell <b class='highlight'>off</b> the shelf.",
                svg: svgWrap(`
                    <polygon points="10,40 50,30 70,40 30,50" fill="#fff" stroke="#0f172a" stroke-width="2.5" stroke-linejoin="round"/>
                    ${ARROW("M 50 35 Q 75 40 85 70", "anim-slide-down")}
                `)
            },
            {
                word: "Beside",
                sentence: "The lamp is <b class='highlight'>beside</b> the sofa.",
                svg: svgWrap(`
                    <rect x="15" y="30" width="30" height="40" fill="#fff" stroke="#0f172a" stroke-width="2.5" />
                    <rect x="55" y="30" width="30" height="40" fill="#fff" stroke="#0f172a" stroke-width="2.5" />
                    ${ARROW("M 30 50 L 70 50", "anim-slide-right")}
                `)
            }
        ];

        // --- Render Function ---
        const gridContainer = document.getElementById('preposition-grid');

        prepositions.forEach((prep) => {
            // Create card element
            const card = document.createElement('div');
            card.className = "group bg-white rounded-xl shadow-sm border border-slate-200 p-4 flex flex-col items-center justify-between cursor-pointer hover:shadow-md hover:border-blue-300 transition-all duration-300 transform hover:-translate-y-1 relative overflow-hidden";
            
            // TTS click handler
            card.onclick = () => {
                // Add a quick pulse effect to the card on click
                card.classList.add('bg-blue-50');
                setTimeout(() => card.classList.remove('bg-blue-50'), 300);

                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel(); // Stop current speaking
                    
                    // Clean sentence for speech (remove html tags and handle slashes)
                    const cleanWord = prep.word.replace('/', ' or ');
                    const tempDiv = document.createElement("div");
                    tempDiv.innerHTML = prep.sentence;
                    const cleanSentence = tempDiv.textContent || tempDiv.innerText || "";
                    
                    const utterance = new SpeechSynthesisUtterance(`${cleanWord}. ${cleanSentence}`);
                    utterance.rate = 0.9; // Slightly slower for clear pronunciation
                    utterance.pitch = 1.1;
                    window.speechSynthesis.speak(utterance);
                }
            };

            // Inject Content
            card.innerHTML = `
                <!-- Sound Icon Indicator -->
                <div class="absolute top-2 right-2 text-slate-300 group-hover:text-blue-500 transition-colors opacity-50 group-hover:opacity-100">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                </div>

                <div class="w-full h-24 sm:h-28 flex items-center justify-center svg-container mb-3">
                    ${prep.svg}
                </div>
                <div class="text-center w-full">
                    <h3 class="font-bold text-lg md:text-xl text-slate-900 mb-1 leading-tight">${prep.word}</h3>
                    <p class="text-xs sm:text-sm text-slate-600 leading-snug">${prep.sentence}</p>
                </div>
            `;

            gridContainer.appendChild(card);
        });
    </script>
</body>
</html>
