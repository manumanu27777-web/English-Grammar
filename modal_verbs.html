<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal Verbs Infographic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            /* Subtle grid background */
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 32px 32px;
        }

        /* Thermometer glass reflection effect */
        .glass-effect {
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 30%, rgba(255,255,255,0) 100%);
        }

        /* Bulb spherical reflection effect */
        .glass-effect-bulb {
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0) 60%);
        }

        /* Smooth, fast transition for liquid level */
        #liquid {
            transition: height 0.05s linear, background-color 0.4s ease;
        }
        
        #indicator-box {
            transition: bottom 0.05s linear, background-color 0.4s ease;
        }

        /* Text transitions for content card */
        #content-inner {
            transition: opacity 0.25s ease-in-out, transform 0.25s ease-in-out;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-8 text-slate-800 antialiased selection:bg-blue-200 selection:text-blue-900 overflow-x-hidden">

    <div class="max-w-5xl w-full flex flex-col lg:flex-row gap-12 lg:gap-24 items-center justify-center">
        
        <!-- ================= THERMOMETER SECTION ================= -->
        <div class="relative flex justify-center py-8 touch-none outline-none select-none shrink-0" id="thermo-wrapper" tabindex="0" aria-label="Modal Verb Scale. Use up and down arrows to adjust.">
            
            <!-- Drag tooltip -->
            <div id="tooltip" class="absolute left-24 bottom-12 bg-slate-800 text-white text-xs font-bold px-3 py-2 rounded shadow-xl whitespace-nowrap animate-bounce pointer-events-none transition-opacity duration-300 z-40">
                Drag to adjust
                <div class="absolute top-1/2 -left-1 -translate-y-1/2 border-y-[5px] border-y-transparent border-r-[5px] border-r-slate-800 w-0 h-0"></div>
            </div>

            <!-- Vertical percentage labels -->
            <div class="absolute -left-10 top-0 bottom-[1.5rem] w-8 flex flex-col justify-between text-[11px] font-bold text-slate-400 text-right z-0 pointer-events-none" style="padding-top: 8px; padding-bottom: 8px;">
                <span>100</span>
                <span>75</span>
                <span>50</span>
                <span>25</span>
                <span>0</span>
            </div>

            <!-- Interactive Thermometer Container -->
            <div class="relative flex flex-col items-center cursor-pointer">
                <!-- Tube -->
                <div id="tube" class="w-8 h-[300px] lg:h-[450px] bg-white/80 backdrop-blur-sm rounded-t-full relative shadow-[inset_0_2px_8px_rgba(0,0,0,0.1)] border border-slate-200 z-10 overflow-hidden">
                    
                    <!-- Internal scale ticks -->
                    <div class="absolute inset-0 flex flex-col justify-between py-2 pointer-events-none z-20">
                        <div class="w-3 h-[2px] bg-slate-800/15"></div> <!-- 100 -->
                        <div class="w-1.5 h-px bg-slate-800/10"></div>
                        <div class="w-3 h-[2px] bg-slate-800/15"></div> <!-- 75 -->
                        <div class="w-1.5 h-px bg-slate-800/10"></div>
                        <div class="w-3 h-[2px] bg-slate-800/15"></div> <!-- 50 -->
                        <div class="w-1.5 h-px bg-slate-800/10"></div>
                        <div class="w-3 h-[2px] bg-slate-800/15"></div> <!-- 25 -->
                        <div class="w-1.5 h-px bg-slate-800/10"></div>
                        <div class="w-3 h-[2px] bg-slate-800/15"></div> <!-- 0 -->
                    </div>
                    
                    <!-- Colored Liquid Fill -->
                    <div id="liquid" class="absolute bottom-0 w-full z-10" style="height: 50%; background-color: #10b981;">
                        <div class="absolute inset-0 glass-effect"></div>
                        <!-- Top liquid curve -->
                        <div class="absolute top-[-4px] left-0 right-0 h-2 bg-inherit rounded-full shadow-[inset_0_2px_4px_rgba(255,255,255,0.4)]"></div>
                    </div>
                </div>
                
                <!-- Bottom Bulb -->
                <div class="w-16 h-16 rounded-full -mt-5 z-20 relative shadow-[0_8px_16px_rgba(0,0,0,0.15)] transition-colors duration-400 border border-slate-200 flex items-center justify-center" id="bulb" style="background-color: #10b981;">
                    <div class="absolute inset-0 rounded-full glass-effect-bulb"></div>
                    <div class="w-4 h-4 bg-white/40 rounded-full absolute top-2 right-3 shadow-[0_0_8px_rgba(255,255,255,0.8)] pointer-events-none"></div>
                </div>

                <!-- Floating Percentage Indicator -->
                <div id="indicator-box" class="absolute left-[3.25rem] w-[3.5rem] text-[11px] font-black text-white text-center py-1 rounded shadow-lg pointer-events-none z-30" style="bottom: 50%; transform: translateY(50%); background-color: #10b981;">
                    <div id="indicator-arrow" class="absolute top-1/2 -left-1 -translate-y-1/2 border-y-[5px] border-y-transparent border-r-[5px] w-0 h-0 transition-colors duration-400" style="border-right-color: #10b981;"></div>
                    <span id="indicator-text">50%</span>
                </div>
            </div>
        </div>

        <!-- ================= CONTENT CARD ================= -->
        <div class="flex-1 w-full max-w-2xl bg-white/90 backdrop-blur-md rounded-[2.5rem] p-8 md:p-12 shadow-2xl border border-slate-100 relative overflow-hidden" style="min-height: 520px;">
            
            <!-- Soft glow in the background corner -->
            <div id="bg-glow" class="absolute -top-32 -right-32 w-[30rem] h-[30rem] rounded-full opacity-10 transition-colors duration-700 blur-[80px] pointer-events-none" style="background-color: #10b981;"></div>
            
            <div id="content-inner" class="relative z-10 opacity-100 translate-y-0">
                <p class="uppercase tracking-widest text-xs font-bold text-slate-400 mb-2">Degree of Modality</p>
                <h1 class="text-5xl md:text-6xl font-black mb-8 transition-colors duration-300" id="title" style="color: #10b981;">Can</h1>
                
                <!-- Badges -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-8">
                    <div class="flex items-center gap-4 bg-slate-50 border border-slate-100 p-4 rounded-2xl shadow-sm">
                        <div id="icon-cert" style="color: #10b981;">
                            <!-- Target SVG -->
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"></circle>
                                <circle cx="12" cy="12" r="6"></circle>
                                <circle cx="12" cy="12" r="2"></circle>
                            </svg>
                        </div>
                        <div>
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-0.5">Certainty Level</p>
                            <p class="text-lg font-bold text-slate-800 leading-none" id="certainty-text">30% - 50% (Moderate)</p>
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-4 bg-slate-50 border border-slate-100 p-4 rounded-2xl shadow-sm">
                        <div id="icon-obl" style="color: #10b981;">
                            <!-- Shield SVG -->
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                                <line x1="12" y1="8" x2="12" y2="12"></line>
                                <line x1="12" y1="16" x2="12.01" y2="16"></line>
                            </svg>
                        </div>
                        <div>
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-0.5">Obligation Level</p>
                            <p class="text-lg font-bold text-slate-800 leading-none" id="obligation-text">Ability / Permitted</p>
                        </div>
                    </div>
                </div>
                
                <div class="mb-8">
                    <h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-3">Meaning</h3>
                    <p class="text-slate-600 leading-relaxed text-lg" id="desc-text">Typically used to express general possibility, physical or mental ability, or to ask for and give permission.</p>
                </div>

                <div>
                    <h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-3">Examples in Context</h3>
                    <div class="space-y-3" id="examples-container">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ================= JAVASCRIPT ================= -->
    <script>
        const verbData = [
            {
                max: 25,
                title: "Might",
                color: "#3b82f6", // blue-500
                certainty: "0% - 25% (Low)",
                obligation: "Optional",
                desc: "Used to express a weak possibility or a tentative suggestion. It indicates low certainty and no strong commitment to an action.",
                examples: [
                    "I might go to the gym later if I have enough time.",
                    "You might want to take an umbrella, just in case."
                ]
            },
            {
                max: 50,
                title: "Can",
                color: "#10b981", // emerald-500
                certainty: "30% - 50% (Moderate)",
                obligation: "Ability / Permitted",
                desc: "Typically used to express general possibility, a physical or mental ability, or to ask for and grant permission.",
                examples: [
                    "Anyone can learn a new language with enough practice.",
                    "Can I leave the office a bit early today?"
                ]
            },
            {
                max: 75,
                title: "Should",
                color: "#f59e0b", // amber-500
                certainty: "70% - 80% (High)",
                obligation: "Recommendation",
                desc: "Expresses advice, a strong recommendation, or a logical assumption based on current facts. It represents what is sensible.",
                examples: [
                    "You should see a doctor about that persistent cough.",
                    "They left an hour ago, so they should be arriving soon."
                ]
            },
            {
                max: 100,
                title: "Must",
                color: "#ef4444", // red-500
                certainty: "90% - 100% (Absolute)",
                obligation: "Mandatory",
                desc: "Indicates strict necessity, a mandatory rule, or absolute certainty about a deduction. There is little to no room for alternatives.",
                examples: [
                    "All passengers must fasten their seatbelts immediately.",
                    "The ground is soaking wet; it must have rained last night."
                ]
            }
        ];

        // Core variables
        const thermoWrapper = document.getElementById('thermo-wrapper');
        const tube = document.getElementById('tube');
        
        let currentPercentage = 50;
        let activeZoneIndex = -1;
        let isDragging = false;
        let transitionTimeout;
        let hasInteracted = false;

        // Init UI
        document.addEventListener('DOMContentLoaded', () => {
            renderUI(currentPercentage, true);
        });

        // Event Listeners for Mouse and Touch
        function handleStart(e) {
            isDragging = true;
            hideTooltip();
            renderUI(calculatePercentage(e));
        }

        function handleMove(e) {
            if (!isDragging) return;
            if (e.cancelable) e.preventDefault(); // Prevents touch scrolling
            renderUI(calculatePercentage(e));
        }

        function handleEnd() {
            isDragging = false;
        }

        thermoWrapper.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove, { passive: false });
        window.addEventListener('mouseup', handleEnd);

        thermoWrapper.addEventListener('touchstart', handleStart, { passive: false });
        window.addEventListener('touchmove', handleMove, { passive: false });
        window.addEventListener('touchend', handleEnd);

        // Keyboard Accessibility
        thermoWrapper.addEventListener('keydown', (e) => {
            let p = currentPercentage;
            const step = 5;
            
            if (e.key === 'ArrowUp' || e.key === 'ArrowRight') p += step;
            if (e.key === 'ArrowDown' || e.key === 'ArrowLeft') p -= step;
            if (e.key === 'Home') p = 100;
            if (e.key === 'End') p = 0;
            
            p = Math.max(0, Math.min(100, p));
            if (p !== currentPercentage) {
                e.preventDefault();
                hideTooltip();
                renderUI(p);
            }
        });

        function hideTooltip() {
            if (!hasInteracted) {
                hasInteracted = true;
                const tooltip = document.getElementById('tooltip');
                tooltip.style.opacity = '0';
            }
        }

        function calculatePercentage(e) {
            const rect = tube.getBoundingClientRect();
            // Get Y coordinate for mouse or touch
            let clientY = e.clientY;
            if (e.touches && e.touches.length > 0) clientY = e.touches[0].clientY;
            
            // Calculate percentage from bottom to top
            let p = 100 - ((clientY - rect.top) / rect.height) * 100;
            return Math.max(0, Math.min(100, p));
        }

        function renderUI(percentage, forceContentUpdate = false) {
            currentPercentage = percentage;
            
            // 1. Update Thermometer Visuals dynamically
            document.getElementById('liquid').style.height = `${percentage}%`;
            document.getElementById('indicator-box').style.bottom = `${percentage}%`;
            document.getElementById('indicator-text').innerText = `${Math.round(percentage)}%`;

            // 2. Determine Zone
            let zoneIndex = 0;
            for (let i = 0; i < verbData.length; i++) {
                if (percentage <= verbData[i].max) {
                    zoneIndex = i;
                    break;
                }
            }

            const data = verbData[zoneIndex];

            // 3. Update Colors dynamically
            document.getElementById('liquid').style.backgroundColor = data.color;
            document.getElementById('bulb').style.backgroundColor = data.color;
            document.getElementById('indicator-box').style.backgroundColor = data.color;
            document.getElementById('indicator-arrow').style.borderRightColor = data.color;

            // 4. Update Content Card ONLY if zone changes (or forced on load)
            if (zoneIndex !== activeZoneIndex || forceContentUpdate) {
                activeZoneIndex = zoneIndex;
                updateContentCard(data);
            }
        }

        function updateContentCard(data) {
            const inner = document.getElementById('content-inner');
            
            // Clear overlapping transition events
            clearTimeout(transitionTimeout);
            
            // Fade out
            inner.style.opacity = '0';
            inner.style.transform = 'translateY(10px)';
            
            transitionTimeout = setTimeout(() => {
                // Swap data
                document.getElementById('title').innerText = data.title;
                document.getElementById('title').style.color = data.color;
                
                document.getElementById('certainty-text').innerText = data.certainty;
                document.getElementById('obligation-text').innerText = data.obligation;
                document.getElementById('desc-text').innerText = data.desc;
                
                document.getElementById('icon-cert').style.color = data.color;
                document.getElementById('icon-obl').style.color = data.color;
                document.getElementById('bg-glow').style.backgroundColor = data.color;
                
                // Rebuild Examples
                const examplesContainer = document.getElementById('examples-container');
                examplesContainer.innerHTML = '';
                
                data.examples.forEach(ex => {
                    const div = document.createElement('div');
                    div.className = `border-l-[5px] pl-5 py-3 bg-slate-50/50 rounded-r-2xl shadow-sm`;
                    div.style.borderLeftColor = data.color;
                    div.innerHTML = `<p class="italic text-slate-700 text-lg">"${ex}"</p>`;
                    examplesContainer.appendChild(div);
                });
                
                // Fade in
                inner.style.opacity = '1';
                inner.style.transform = 'translateY(0)';
            }, 250);
        }
    </script>
</body>
</html>
